name: FSO/TGI CI

on:
  push:
    branches: [ main, jules-* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy sympy pandas pillow matplotlib scipy scikit-learn pytest pytest-asyncio
    - name: Run Core Tests
      env:
        PYTHONPATH: .
      run: |
        pytest research/tests/test_tgi_agent.py research/tests/test_action_mapper.py research/tests/test_knowledge_mapper.py
